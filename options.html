<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Job Lens AI - 设置</title>
    <style>
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; margin: 20px; max-width: 840px; }
      h1 { font-size: 20px; }
      label { font-size: 13px; font-weight: 600; display: block; margin: 16px 0 6px; }
      input, textarea, select { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ccc; font-size: 13px; }
      textarea { min-height: 150px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
      .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
      button { margin-top: 16px; padding: 10px 14px; border: 0; border-radius: 8px; background: #111; color: #fff; cursor: pointer; }
      .hint { color: #666; font-size: 12px; margin-top: 6px; }
      #saveStatus { margin-left: 10px; font-size: 12px; }
      .ok { color: #0a7a24; }
      .err { color: #b42318; }
    </style>
  </head>
  <body>
    <h1>Job Lens AI 设置</h1>

    <label for="apiKey">OpenAI API Key</label>
    <input id="apiKey" type="password" placeholder="sk-..." />

    <div class="row">
      <div>
        <label for="chatModel">聊天模型</label>
        <select id="chatModel">
          <option value="gpt-4o-mini">gpt-4o-mini（省钱）</option>
          <option value="gpt-4.1-mini">gpt-4.1-mini（推荐）</option>
          <option value="gpt-4.1">gpt-4.1（更强）</option>
        </select>
      </div>
      <div>
        <label for="topK">RAG 召回片段数（topK）</label>
        <input id="topK" type="number" min="1" max="12" value="4" />
      </div>
    </div>

    <label for="resumeText">简历文本（用于本地RAG）</label>
    <textarea id="resumeText" placeholder="粘贴你的简历文本（建议中英文都可）"></textarea>
    <div class="hint">隐私说明：简历保存在浏览器本地 storage。分析时只发送检索出的少量片段给 OpenAI。</div>

    <label for="formProfile">常见申请问题默认答案（JSON）</label>
    <textarea id="formProfile" placeholder='{"profileRules":[{"keywords":["non-compete"],"answer":"No"}]}'></textarea>
    <div class="hint">用于“检查并填充申请问题”和“LLM复核表单”。按关键词匹配问题并填写答案。支持 radio/select/text。</div>

    <button id="templateBtn" type="button">填入默认模板</button>
    <button id="saveBtn">保存设置</button><span id="saveStatus"></span>

    <script type="module" src="options.js"></script>
  </body>
</html>
